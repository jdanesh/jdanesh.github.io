<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Seaside Jiu Jitsu is a Brazilian Jiu-Jitsu gym in Lynn, MA. Train with us—view the schedule, meet our instructors, and get contact details."
    />
    <link rel="canonical" href="https://jdanesh.github.io/" />
    <title>Seaside Jiu Jitsu – A Jiu Jitsu gym in the heart of Lynn, MA</title>
    <link rel="preload" as="image" href="/images/seaside-seagull.avif" fetchpriority="high" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&amp;display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&amp;display=swap"
      />
    </noscript>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="home page-home">
    <a class="skip-link screen-reader-text" href="#content">Skip to content</a>

    <header id="site-header" class="site-header dynamic-header menu-dropdown-tablet">
      <div class="header-inner">
        <div class="site-branding show-title">
          <h1 class="site-title hide">
            <a href="/" title="Home">Seaside Jiu Jitsu</a>
          </h1>
        </div>

        <nav class="site-navigation show" aria-label="Primary">
          <div class="menu-main-menu-container">
            <ul id="menu-main-menu" class="menu">
              <li class="menu-item current-menu-item">
                <a href="/" aria-current="page">Home</a>
              </li>
              <li class="menu-item"><a href="/schedule/">Schedule</a></li>
              <li class="menu-item"><a href="/instructors/">Instructors</a></li>
              <li class="menu-item"><a href="/contact-us/">Contact Us</a></li>
            </ul>
          </div>
        </nav>

        <div class="site-navigation-toggle-holder show">
          <button
            type="button"
            class="site-navigation-toggle"
            aria-expanded="false"
            aria-controls="mobile-menu"
          >
            <span class="eicon-menu-bar" aria-hidden="true"></span>
            <span class="screen-reader-text">Menu</span>
          </button>
        </div>

        <nav class="site-navigation-dropdown show" id="mobile-menu" aria-label="Mobile">
          <div class="menu-main-menu-container">
            <ul class="menu">
              <li class="menu-item current-menu-item">
                <a href="/" aria-current="page">Home</a>
              </li>
              <li class="menu-item"><a href="/schedule/">Schedule</a></li>
              <li class="menu-item"><a href="/instructors/">Instructors</a></li>
              <li class="menu-item"><a href="/contact-us/">Contact Us</a></li>
            </ul>
          </div>
        </nav>
      </div>
    </header>

    <main id="content" class="site-main">
      <div class="page-content">
        <div class="e-con-boxed e-con-center">
          <div class="e-con-inner">
            <div class="hero-image-wrap">
              <img
                src="/images/seaside-seagull.avif"
                width="791"
                height="1024"
                alt=""
                decoding="async"
                fetchpriority="high"
                sizes="(max-width: 791px) 100vw, 791px"
              />
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="/js/url-normalize.js" defer></script>
    <script src="/js/main.js" defer></script>
  </body>
</html>
